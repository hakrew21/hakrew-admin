  <style>
    html, body { background-color: #0B0D13; margin: 0; padding: 0; }
    /* 초기 로딩 시 흰 플래시 방지 */
    #flutter-loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0B0D13;
      z-index: 9999;
    }
    #flutter-loading .logo {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: linear-gradient(135deg, #6366F1, #8B5CF6, #EC4899);
      box-shadow: 0 8px 40px rgba(139, 92, 246, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 900;
      font-size: 28px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.85; }
    }
  </style>
</head>
<body>
  <div id="flutter-loading"><div class="logo">H</div></div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('flutter-loading');
      if (el) el.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
